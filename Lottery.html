<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎰 樂透環狀正碼對獎機 🎰</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            max-width: 450px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 26px;
        }
        button {
            width: 100%;
            padding: 16px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(46, 204, 113, 0.3);
            transition: all 0.2s;
        }
        button:hover {
            background-color: #27ae60;
            box-shadow: 0 4px 8px rgba(46, 204, 113, 0.5);
        }
        button:active {
            transform: scale(0.96);
        }
        .result-box {
            margin-top: 30px;
            padding: 20px;
            border-radius: 12px;
            background-color: #fcfcfc;
            border: 2px dashed #ccc;
            display: none;
            text-align: left;
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .ball-container {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
        }
        .ball {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 36px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
            background: radial-gradient(circle at 30% 30%, #e74c3c, #c0392b);
        }
        .ball-label {
            font-size: 12px;
            margin-bottom: 2px;
            letter-spacing: 1px;
            opacity: 0.9;
        }
        .prize-row {
            margin: 15px 0;
            font-size: 18px;
            line-height: 1.6;
            color: #333;
        }
        .prize-title {
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎰 樂透正碼抽籤機 (1-50 循環版)</h1>
    
    <button onclick="drawWinningNumber()">搖珠開獎 🎲</button>
    
    <div id="result" class="result-box">
        <div class="ball-container">
            <div class="ball">
                <span class="ball-label">大顆紅珠</span>
                <span id="winningNumDisplay">-</span>
            </div>
        </div>
        
        <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
        
        <div class="prize-row">
            <span class="prize-title">👑 頭獎 $5,000：</span>
            <span id="grandPrize"></span>
        </div>
        
        <div class="prize-row">
            <span class="prize-title">💥 二獎 $500：</span>
            <span id="secondPrize"></span>
        </div>
        
        <div class="prize-row">
            <span class="prize-title">🛒 普獎 $100：</span>
            <span id="generalPrize"></span>
        </div>
    </div>
</div>

<script>
// 核心環狀函數：確保數字在 1-50 之間循環
function getLoopNumber(n) {
    if (n > 50) return n - 50;
    if (n < 1) return n + 50;
    return n;
}

function drawWinningNumber() {
    // 1. 隨機抽出 1-50 號正碼
    const num = Math.floor(Math.random() * 50) + 1;
    
    // 2. 顯示大顆紅珠號碼
    document.getElementById('winningNumDisplay').innerText = num;
    
    // 3. 依據環狀循環規則計算號碼
    // 頭獎：
    document.getElementById('grandPrize').innerText = num;
    
    // 二獎：(num - 1) 與 (num + 1) 
    let p2_1 = getLoopNumber(num - 1);
    let p2_2 = getLoopNumber(num + 1);
    document.getElementById('secondPrize').innerText = `${p2_1}、${p2_2}`;
    
    // 普獎：(num - 2)、(num - 3) 與 (num + 2)、(num + 3)
    let p3_1 = getLoopNumber(num - 2);
    let p3_2 = getLoopNumber(num - 3);
    let p3_3 = getLoopNumber(num + 2);
    let p3_4 = getLoopNumber(num + 3);
    
    // 為了和你的範例順序完全一樣（先顯示減的，再顯示加的繞回碼）：
    // 範例 50 輸出：47、48、2、3  (註：這邊調整順序讓47在48前面，視覺更順暢)
    let p3_minus = [p3_2, p3_1].sort((a,b) => a-b); // 47, 48
    let p3_plus = [p3_3, p3_4].sort((a,b) => a-b);  // 2, 3
    
    document.getElementById('generalPrize').innerText = `${p3_minus.join('、')}、${p3_plus.join('、')}`;
    
    // 4. 顯示結果區塊
    document.getElementById('result').style.display = 'block';
}
</script>

</body>
</html>
